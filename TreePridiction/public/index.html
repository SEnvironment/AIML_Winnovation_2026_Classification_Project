<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Predictor (Core Metrics)</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            max-width: 700px; 
            margin: 40px auto; 
            padding: 20px; 
            background-color: #f9fafb;
            color: #111827;
        }
        h2 { border-bottom: 2px solid #e5e7eb; padding-bottom: 10px; margin-bottom: 5px;}
        p { color: #6b7280; margin-bottom: 25px; }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .input-group { 
            background: white;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.85rem; color: #374151;}
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #d1d5db; border-radius: 4px; }
        button { 
            padding: 12px 24px; 
            background-color: #0070f3; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 1rem;
            font-weight: bold;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover { background-color: #0051b3; }
        #result-box { 
            margin-top: 25px; 
            padding: 15px; 
            border-radius: 6px; 
            display: none;
            font-weight: bold; 
            text-align: center;
            font-size: 1.2rem; 
        }
        .success { background-color: #d1fae5; color: #065f46; border: 1px solid #34d399; }
        .error { background-color: #fee2e2; color: #991b1b; border: 1px solid #f87171; }
    </style>
</head>
<body>

    <h2>Model Prediction Dashboard</h2>
    <p>Provide values for the 11 primary environmental features to evaluate the model matrix.</p>
    
    <form id="predictionForm">
        <!-- Grid UI for the 11 visible inputs -->
        <div class="grid-container" id="visibleInputs"></div>
        
        <button type="submit">Run Prediction</button>
    </form>

    <div id="result-box"></div>

    <script>
        // Only the first 11 features will be rendered on the webpage
        const explicitFeatures = [
            "Light_ISF", "Core", "Sterile", "AMF", "EMF", 
            "Phenolics", "Lignin", "NSC", "Census", "Time", "Harvest"
        ];

        const inputContainer = document.getElementById('visibleInputs');

        // Dynamically create fields for just these 11 features
        explicitFeatures.forEach((name, index) => {
            const group = document.createElement('div');
            group.className = 'input-group';
            group.innerHTML = `
                <label for="feat-${index}">${name}</label>
                <input type="number" step="any" id="feat-${index}" name="${name}" required value="0">
            `;
            inputContainer.appendChild(group);
        });

        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultBox = document.getElementById('result-box');
            resultBox.style.display = 'none';
            
            // 1. Collect the 11 user-inputted values
            const featuresArray = [];
            for (let i = 0; i < explicitFeatures.length; i++) {
                const val = parseFloat(document.getElementById(`feat-${i}`).value);
                featuresArray.push(isNaN(val) ? 0.0 : val);
            }

            // 2. Pad the array with 62 zeros to satisfy the model's 73-feature requirement
            while (featuresArray.length < 73) {
                featuresArray.push(0.0);
            }

            // 3. Send the full payload to your FastAPI endpoint
            try {
                const response = await fetch('/api/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ features: featuresArray })
                });

                const data = await response.json();
                
                resultBox.style.display = 'block';
                if (data.status === 'success') {
                    resultBox.className = 'success';
                    resultBox.innerText = `Prediction Result: Class [ ${data.prediction} ]`;
                } else {
                    resultBox.className = 'error';
                    resultBox.innerText = `API Error: ${data.message}`;
                }
            } catch (err) {
                resultBox.style.display = 'block';
                resultBox.className = 'error';
                resultBox.innerText = `Network Error: Could not connect to backend endpoint.`;
            }
        });
    </script>
</body>
</html>
