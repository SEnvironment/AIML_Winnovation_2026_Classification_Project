<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VotingClassifier Model Predictor</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            max-width: 800px; 
            margin: 40px auto; 
            padding: 20px; 
            background-color: #f9fafb;
            color: #111827;
        }
        h2 { border-bottom: 2px solid #e5e7eb; padding-bottom: 10px; }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .input-group { 
            background: white;
            padding: 10px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
        }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.85rem; color: #374151;}
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #d1d5db; border-radius: 4px; }
        button { 
            padding: 12px 24px; 
            background-color: #0070f3; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 1rem;
            font-weight: bold;
            width: 100%;
        }
        button:hover { background-color: #0051b3; }
        #result-box { 
            margin-top: 25px; 
            padding: 15px; 
            border-radius: 6px; 
            display: none;
            font-weight: bold; 
            text-align: center;
            font-size: 1.2rem; 
        }
        .success { background-color: #d1fae5; color: #065f46; border: 1px solid #34d399; }
        .error { background-color: #fee2e2; color: #991b1b; border: 1px solid #f87171; }
    </style>
</head>
<body>

    <h2>Model Prediction Dashboard</h2>
    <p>Enter the environment metrics below to get a classification prediction from the ensemble model.</p>
    
    <form id="predictionForm">
        <!-- JS will dynamically populate all 73 inputs inside this container -->
        <div class="grid-container" id="dynamicInputs"></div>
        
        <button type="submit">Run Prediction Matrix</button>
    </form>

    <div id="result-box"></div>

    <script>
        // 1. List the order of your model's 73 feature names exactly as trained
        const featureNames = [
            "Light_ISF", "Core", "Sterile", "AMF", "EMF", "Phenolics", "Lignin", "NSC", 
            "Census", "Time", "Harvest"
            // ... Add the remaining 62 exact feature string names here ...
        ];

        // Fill out the remaining array slots if names are missing yet, to match shape 73
        while(featureNames.length < 73) {
            featureNames.push(`Feature_${featureNames.length + 1}`);
        }

        const inputContainer = document.getElementById('dynamicInputs');

        // 2. Generate the HTML inputs dynamically using JS
        featureNames.forEach((name, index) => {
            const group = document.createElement('div');
            group.className = 'input-group';
            
            group.innerHTML = `
                <label for="feat-${index}">${name}</label>
                <input type="number" step="any" id="feat-${index}" name="${name}" required value="0">
            `;
            inputContainer.appendChild(group);
        });

        // 3. Capture form submission, format array, and hit the backend API
        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultBox = document.getElementById('result-box');
            resultBox.style.display = 'none';
            
            // Build the structured array of 73 elements in chronological order
            const featuresArray = [];
            for (let i = 0; i < 73; i++) {
                const val = parseFloat(document.getElementById(`feat-${i}`).value);
                featuresArray.push(isNaN(val) ? 0.0 : val);
            }

            try {
                const response = await fetch('/api/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ features: featuresArray })
                });

                const data = await response.json();
                
                resultBox.style.display = 'block';
                if (data.status === 'success') {
                    resultBox.className = 'success';
                    resultBox.innerText = `Prediction Result: Class [ ${data.prediction} ]`;
                } else {
                    resultBox.className = 'error';
                    resultBox.innerText = `API Error: ${data.message}`;
                }
            } catch (err) {
                resultBox.style.display = 'block';
                resultBox.className = 'error';
                resultBox.innerText = `Network Error: Could not connect to backend endpoint.`;
            }
        });
    </script>
</body>
</html>
